<app-auth-layout
  title="Bem-vindo de volta"
  subtitle="Insira suas credenciais para gerenciar seus emprestimos."
  activeTab="login"
>
  @if (successMessage()) {
    <div class="mb-6 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700" role="status">
      {{ successMessage() }}
    </div>
  }

  <app-login-form [authError]="authError()" (submitted)="onClickLogin($event)" />
</app-auth-layout>
