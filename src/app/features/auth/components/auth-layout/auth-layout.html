<section class="relative min-h-screen overflow-hidden bg-slate-950 text-slate-100">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(34,211,238,0.18),_transparent_35%),radial-gradient(circle_at_bottom_right,_rgba(14,165,233,0.14),_transparent_30%)]"></div>

  <div class="relative mx-auto grid min-h-screen max-w-7xl items-center gap-10 px-6 py-10 lg:grid-cols-[1.05fr_0.95fr] lg:px-10">
    <div class="hidden rounded-[2rem] border border-white/10 bg-white/5 p-10 shadow-2xl shadow-cyan-950/30 backdrop-blur lg:block">
      <p class="text-sm uppercase tracking-[0.3em] text-cyan-300">{{ eyebrow() }}</p>
      <h1 class="mt-6 max-w-xl text-5xl font-semibold tracking-tight text-white">
        {{ panelTitle() }}
      </h1>
      <p class="mt-6 max-w-xl text-lg leading-8 text-slate-300">
        {{ panelBody() }}
      </p>

      <div class="mt-10 grid gap-4 sm:grid-cols-3">
        <article class="rounded-2xl border border-white/10 bg-slate-900/70 p-5">
          <p class="text-sm text-slate-400">Open loans</p>
          <p class="mt-3 text-3xl font-semibold text-white">128</p>
        </article>
        <article class="rounded-2xl border border-white/10 bg-slate-900/70 p-5">
          <p class="text-sm text-slate-400">Due today</p>
          <p class="mt-3 text-3xl font-semibold text-white">09</p>
        </article>
        <article class="rounded-2xl border border-white/10 bg-slate-900/70 p-5">
          <p class="text-sm text-slate-400">Active users</p>
          <p class="mt-3 text-3xl font-semibold text-white">34</p>
        </article>
      </div>
    </div>

    <div class="mx-auto w-full max-w-xl rounded-[2rem] border border-white/10 bg-slate-900/85 p-6 shadow-2xl shadow-black/30 backdrop-blur sm:p-8">
      <div class="mb-8">
        <p class="text-sm uppercase tracking-[0.3em] text-cyan-300">{{ eyebrow() }}</p>
        <h2 class="mt-4 text-3xl font-semibold tracking-tight text-white sm:text-4xl">
          {{ title() }}
        </h2>
        <p class="mt-3 text-base leading-7 text-slate-300">
          {{ description() }}
        </p>
      </div>

      <ng-content />
    </div>
  </div>
</section>
