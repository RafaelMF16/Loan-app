<app-auth-layout
  title="Create your account"
  description="Set up a local user for the static authentication flow. This stays entirely in memory for the current session."
  panelTitle="Launch a polished onboarding experience before wiring the backend."
  panelBody="This first slice focuses on responsive authentication screens, solid validation, and a feature-based Angular structure that is ready for future API integration."
>
  @if (feedback()) {
    @if (feedback()?.type === 'success') {
      <div class="mb-6 rounded-2xl border border-emerald-400/30 bg-emerald-400/10 px-4 py-3 text-sm text-emerald-200" role="status">
        {{ feedback()?.message }}
      </div>
    } @else {
      <div class="mb-6 rounded-2xl border border-rose-400/30 bg-rose-400/10 px-4 py-3 text-sm text-rose-200" role="status">
        {{ feedback()?.message }}
      </div>
    }
  }

  <app-register-form (submitted)="handleRegister($event)" />
</app-auth-layout>
