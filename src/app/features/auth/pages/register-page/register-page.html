<app-auth-layout title="Cadastro">
  @if (feedback()) {
    @if (feedback()?.type === 'success') {
      <div class="mb-6 rounded-2xl border border-emerald-400/30 bg-emerald-400/10 px-4 py-3 text-sm text-emerald-200" role="status">
        {{ feedback()?.message }}
      </div>
    } @else {
      <div class="mb-6 rounded-2xl border border-rose-400/30 bg-rose-400/10 px-4 py-3 text-sm text-rose-200" role="status">
        {{ feedback()?.message }}
      </div>
    }
  }

  <app-register-form (submitted)="handleRegister($event)" />
</app-auth-layout>
