<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/45 px-4 py-8 backdrop-blur-sm">
  <div class="w-full max-w-[560px] overflow-hidden rounded-[24px] bg-white shadow-[0_30px_80px_rgba(15,23,42,0.25)]">
    <div class="flex items-center justify-between border-b border-slate-200 px-8 py-6">
      <h2 class="text-[2rem] font-semibold tracking-tight text-slate-950">Cadastrar Novo Item</h2>
      <button
        type="button"
        (click)="onClickCloseModal()"
        class="rounded-full p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-600"
        aria-label="Fechar modal"
      >
        <svg viewBox="0 0 24 24" class="h-7 w-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="m6 6 12 12" />
          <path d="M18 6 6 18" />
        </svg>
      </button>
    </div>

    <form class="space-y-8 px-8 py-8" [formGroup]="form" (ngSubmit)="onClickSaveItem()">
      <div class="space-y-3">
        <label class="block text-xl font-semibold text-slate-900" for="item-name">Nome do Item</label>
        <input
          id="item-name"
          type="text"
          formControlName="name"
          class="w-full rounded-2xl border border-slate-200 px-4 py-4 text-base text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-400 focus:ring-4 focus:ring-blue-100"
          placeholder="Ex: Projetor Epson"
        />
      </div>

      <div class="space-y-3">
        <label class="block text-xl font-semibold text-slate-900" for="item-description">Descricao do Item</label>
        <textarea
          id="item-description"
          rows="4"
          formControlName="description"
          class="w-full resize-none rounded-2xl border border-slate-200 px-4 py-4 text-base text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-400 focus:ring-4 focus:ring-blue-100"
          placeholder="Detalhes tecnicos, cor, estado de conservacao..."
        ></textarea>
      </div>

      <div class="space-y-3">
        <label class="block text-xl font-semibold text-slate-900" for="item-status">Status Inicial</label>
        <div class="relative">
          <select
            id="item-status"
            formControlName="status"
            class="w-full appearance-none rounded-2xl border border-slate-200 bg-white px-4 py-4 pr-12 text-base text-slate-900 outline-none transition focus:border-blue-400 focus:ring-4 focus:ring-blue-100"
          >
            <option value="disponivel">Disponivel</option>
            <option value="emprestado">Emprestado</option>
          </select>
          <svg viewBox="0 0 24 24" class="pointer-events-none absolute right-4 top-1/2 h-6 w-6 -translate-y-1/2 text-slate-500" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m6 9 6 6 6-6" />
          </svg>
        </div>
      </div>

      <div class="flex flex-col-reverse gap-4 pt-2 sm:flex-row sm:justify-end">
        <button
          type="button"
          (click)="onClickCloseModal()"
          class="w-full rounded-2xl border border-slate-200 px-6 py-4 text-lg font-semibold text-slate-800 transition hover:bg-slate-50 sm:w-[170px]"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="w-full rounded-2xl bg-blue-500 px-6 py-4 text-lg font-semibold text-white shadow-[0_10px_24px_rgba(59,130,246,0.28)] transition hover:bg-blue-600 sm:w-[220px]"
        >
          Salvar Item
        </button>
      </div>
    </form>
  </div>
</div>
