<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/45 px-4 py-8 backdrop-blur-sm">
  <div class="w-full max-w-[500px] overflow-hidden rounded-[20px] bg-white shadow-[0_26px_64px_rgba(15,23,42,0.22)]">
    <div class="flex items-center justify-between border-b border-slate-200 px-6 py-5">
      <h2 class="text-[1.7rem] font-semibold tracking-tight text-slate-950">
        {{ isEditMode ? 'Editar Item' : 'Cadastrar Novo Item' }}
      </h2>
      <button
        type="button"
        (click)="onClickCloseModal()"
        class="rounded-full p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-600"
        aria-label="Fechar modal"
      >
        <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="m6 6 12 12" />
          <path d="M18 6 6 18" />
        </svg>
      </button>
    </div>

    <form class="space-y-5 px-6 py-6" [formGroup]="form" (ngSubmit)="onClickSaveItem()">
      <div class="space-y-2.5">
        <label class="block text-lg font-semibold text-slate-900" for="item-name">Nome do Item</label>
        <input
          id="item-name"
          type="text"
          formControlName="name"
          class="w-full rounded-2xl border border-slate-200 px-4 py-3.5 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-400 focus:ring-4 focus:ring-blue-100"
          placeholder="Ex: Projetor Epson"
        />
      </div>

      <div class="space-y-2.5">
        <label class="block text-lg font-semibold text-slate-900" for="item-description">Descrição do Item</label>
        <textarea
          id="item-description"
          rows="3"
          formControlName="description"
          class="w-full resize-none rounded-2xl border border-slate-200 px-4 py-3.5 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-400 focus:ring-4 focus:ring-blue-100"
          placeholder="Detalhes técnicos, cor, estado de conservação..."
        ></textarea>
      </div>

      <!-- Seletor visual de ícone -->
      <div class="space-y-2.5">
        <span class="block text-lg font-semibold text-slate-900">Ícone</span>
        <div class="grid grid-cols-4 gap-2">
          @for (icon of icons; track icon.value) {
            <button
              type="button"
              (click)="selectIcon(icon.value)"
              [class]="selectedIcon === icon.value
                ? 'flex flex-col items-center gap-2 rounded-2xl border-2 border-blue-500 bg-blue-50 p-3 text-blue-700 transition'
                : 'flex flex-col items-center gap-2 rounded-2xl border border-slate-200 bg-white p-3 text-slate-500 transition hover:border-slate-300 hover:bg-slate-50'"
            >
              @switch (icon.value) {
                @case ('notebook') {
                  <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="4" y="5" width="16" height="11" rx="1.8" />
                    <path d="M2 19h20" />
                  </svg>
                }
                @case ('camera') {
                  <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M4 7h3l1.5-2h5L15 7h5v11H4z" />
                    <circle cx="12" cy="12.5" r="3.2" />
                  </svg>
                }
                @case ('tablet') {
                  <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="7" y="3" width="10" height="18" rx="1.8" />
                    <path d="M10 6h4" />
                    <circle cx="12" cy="17.5" r=".7" fill="currentColor" stroke="none" />
                  </svg>
                }
                @case ('fone') {
                  <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M5 13a7 7 0 0 1 14 0" />
                    <path d="M5 13v4a2 2 0 0 0 2 2h1v-6H7a2 2 0 0 0-2 2Z" />
                    <path d="M19 13v4a2 2 0 0 1-2 2h-1v-6h1a2 2 0 0 1 2 2Z" />
                  </svg>
                }
              }
              <span class="text-xs font-medium">{{ icon.label }}</span>
            </button>
          }
        </div>
      </div>

      <div class="flex flex-col-reverse gap-3 pt-2 sm:flex-row sm:justify-end">
        <button
          type="button"
          (click)="onClickCloseModal()"
          class="w-full rounded-2xl border border-slate-200 px-6 py-3.5 text-base font-semibold text-slate-800 transition hover:bg-slate-50 sm:w-[150px]"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="w-full rounded-2xl bg-blue-500 px-6 py-3.5 text-base font-semibold text-white shadow-[0_10px_24px_rgba(59,130,246,0.28)] transition hover:bg-blue-600 sm:w-[190px]"
        >
          {{ isEditMode ? 'Salvar Alterações' : 'Salvar Item' }}
        </button>
      </div>
    </form>
  </div>
</div>
