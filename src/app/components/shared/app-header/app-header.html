<header class="border-b border-slate-200 bg-white">
  <div class="flex items-center justify-between gap-4 px-5 py-3">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-blue-50 text-blue-600">
          <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 10.5h18" />
            <path d="M5 10.5V19" />
            <path d="M10 10.5V19" />
            <path d="M14 10.5V19" />
            <path d="M19 10.5V19" />
            <path d="M2.5 21h19" />
            <path d="M12 3 3 7.5h18L12 3Z" />
          </svg>
        </div>
        <span class="text-[1.5rem] font-semibold tracking-tight text-slate-950">Gestao de Itens</span>
      </div>

      @if (showAvatar()) {
        <nav class="hidden items-center gap-1 sm:flex" aria-label="Navegação principal">
          <a
            routerLink="/items"
            routerLinkActive="bg-slate-100 text-slate-900"
            class="rounded-xl px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-50 hover:text-slate-900"
          >
            Itens
          </a>
          <a
            routerLink="/loans"
            routerLinkActive="bg-slate-100 text-slate-900"
            class="rounded-xl px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-50 hover:text-slate-900"
          >
            Empréstimos
          </a>
          <a
            routerLink="/dashboard"
            routerLinkActive="bg-slate-100 text-slate-900"
            class="rounded-xl px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-50 hover:text-slate-900"
          >
            Dashboard
          </a>
          <a
            routerLink="/reports"
            routerLinkActive="bg-slate-100 text-slate-900"
            class="rounded-xl px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-50 hover:text-slate-900"
          >
            Relatórios
          </a>
          @if (currentUser()?.role === 'admin') {
            <a
              routerLink="/admin"
              routerLinkActive="bg-slate-100 text-slate-900"
              class="rounded-xl px-4 py-2 text-sm font-medium text-blue-600 transition hover:bg-blue-50 hover:text-blue-700"
            >
              Admin
            </a>
          }
        </nav>
      }
    </div>

    @if (showAvatar()) {
      <div class="relative" data-user-menu>
        <button
          type="button"
          (click)="toggleMenu()"
          class="flex h-11 w-11 items-center justify-center rounded-full border border-slate-200 bg-slate-50 text-slate-500 transition hover:border-slate-300 hover:bg-slate-100"
          aria-label="Menu do usuário"
          [attr.aria-expanded]="menuOpen()"
        >
          <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 21a8 8 0 0 0-16 0" />
            <circle cx="12" cy="8" r="4" />
          </svg>
        </button>

        @if (menuOpen()) {
          <div
            class="absolute right-0 top-[calc(100%+8px)] z-50 w-56 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-[0_16px_40px_rgba(15,23,42,0.14)]"
            role="menu"
          >
            @if (currentUser(); as user) {
              <div class="border-b border-slate-100 px-4 py-3">
                <p class="truncate text-sm font-semibold text-slate-900">{{ user.name }}</p>
                <p class="truncate text-xs text-slate-500">{{ user.email }}</p>
              </div>
            }

            <div class="p-1.5">
              <button
                type="button"
                (click)="onClickLogout()"
                role="menuitem"
                class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-rose-600 transition hover:bg-rose-50"
              >
                <svg viewBox="0 0 24 24" class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Sair
              </button>
            </div>
          </div>
        }
      </div>
    }
  </div>
</header>
